<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julia Set Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Canvas target for ImGui/WebGL2 rendering -->
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  <div id="status">Loading...</div>

  <script>
    // Shared Module config consumed by whichever binary loads below.
    var Module = {
      canvas: document.getElementById('canvas'),
      setStatus: function(text) {
        var el = document.getElementById('status');
        if (text) el.innerText = text;
        else el.style.display = 'none';
      },
    };

    // Runtime detection: SharedArrayBuffer (required by -sPTHREAD) is only available
    // when the page is cross-origin isolated (COOP + COEP response headers).
    // GitHub Pages cannot send those headers, so we fall back to the single-threaded
    // binary there.  A server that does send them (e.g. a local dev server with the
    // right headers, or a self-hosted deployment) gets the multi-threaded binary.
    var script = document.createElement('script');
    script.src = (typeof crossOriginIsolated !== 'undefined' && crossOriginIsolated)
                 ? 'julia_mt.js'
                 : 'julia_st.js';
    document.body.appendChild(script);
  </script>
</body>
</html>
